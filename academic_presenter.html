<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 3 — Final Project Presenter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1B2A4A;--red:#C8102E;--cream:#F5EDE0;--bg:#f4f4f2;--textLight:#6B7B94}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--navy);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}

/* TOP BAR */
.topbar{background:var(--navy);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--red);height:44px;flex-shrink:0}
.topbar h1{color:white;font-size:13px;font-weight:600;letter-spacing:1.5px}
.topbar .controls{display:flex;align-items:center;gap:12px}
.topbar .back-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.3);color:white;padding:5px 14px;border-radius:6px;font-size:11px;cursor:pointer;text-decoration:none;font-weight:500;transition:all 0.2s}
.topbar .back-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.6)}
.slide-counter{color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;letter-spacing:1px}
.slide-counter strong{color:white}

/* MAIN LAYOUT */
.main-layout{display:flex;height:calc(100vh - 44px)}

/* LEFT: SLIDE IMAGE */
.slide-panel{flex:1;display:flex;flex-direction:column;background:#222;position:relative}
.img-container{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
.img-container img{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 4px 24px rgba(0,0,0,0.3);border-radius:4px;background:white}

/* NAV BAR */
.nav-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px;background:rgba(0,0,0,0.3);flex-shrink:0}
.nav-bar button{background:var(--navy);color:white;border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.nav-bar button:hover{background:var(--red)}
.nav-bar button:disabled{opacity:0.2;cursor:default;background:var(--navy)}
.nav-dots{display:flex;gap:5px}
.nav-dots span{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.2s}
.nav-dots span.active{background:var(--red);transform:scale(1.3)}

/* RIGHT: NOTES PANEL */
.notes-panel{width:340px;background:white;border-left:1px solid #ddd;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.notes-header{padding:14px 18px;background:var(--cream);border-bottom:1px solid #e5ddd0;flex-shrink:0}
.notes-header h3{font-size:11px;font-weight:700;color:var(--red);letter-spacing:2px;text-transform:uppercase}
.notes-header .slide-title{font-size:14px;font-weight:600;color:var(--navy);margin-top:4px}
.notes-body{flex:1;overflow-y:auto;padding:18px}
.notes-body p{font-size:13px;color:#444;line-height:1.8;margin-bottom:10px}
.notes-body .empty{color:#bbb;font-style:italic;font-size:13px;text-align:center;margin-top:40px}

/* KEYBOARD HINT */
.kb-hint{padding:8px;text-align:center;font-size:9px;color:rgba(255,255,255,0.3);background:rgba(0,0,0,0.2);flex-shrink:0}

/* TTS CONTROLS */
.tts-controls{display:flex;gap:8px;padding:10px 18px;background:var(--cream);border-bottom:1px solid #e5ddd0;flex-shrink:0;align-items:center}
.tts-btn{background:var(--navy);color:white;border:none;padding:7px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tts-btn:hover{background:var(--red)}
.tts-btn.active{background:var(--red);animation:pulse-btn 2s ease-in-out infinite}
.tts-btn.stop{background:#666}
.tts-btn.stop:hover{background:#888}
@keyframes pulse-btn{0%,100%{opacity:1}50%{opacity:0.8}}
.sound-indicator{display:none;align-items:flex-end;gap:2px;height:16px;margin-left:6px}
.sound-indicator.active{display:flex}
.sound-bar{width:3px;background:var(--red);border-radius:1.5px;animation:sound-wave 1s ease-in-out infinite}
.sound-bar:nth-child(1){height:4px;animation-delay:0s}
.sound-bar:nth-child(2){height:10px;animation-delay:0.15s}
.sound-bar:nth-child(3){height:6px;animation-delay:0.3s}
.sound-bar:nth-child(4){height:14px;animation-delay:0.1s}
.sound-bar:nth-child(5){height:8px;animation-delay:0.25s}
@keyframes sound-wave{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
.tts-timer{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:12px;font-weight:600;color:var(--navy);letter-spacing:0.5px;margin-left:auto;min-width:44px;text-align:right}
.tts-status-text{font-size:10px;color:var(--textLight);letter-spacing:0.3px;margin-left:8px}

/* RESPONSIVE */
@media(max-width:900px){.notes-panel{width:280px}}
@media(max-width:700px){
.main-layout{flex-direction:column}
.notes-panel{width:100%;height:40vh;border-left:none;border-top:1px solid #ddd}
}
</style>
</head>
<body>

<div class="topbar">
<h1>GROUP 3 &mdash; LEADING THROUGH CHANGE</h1>
<div class="controls">
<span class="slide-counter">SLIDE <strong id="currentNum">1</strong> / <strong>6</strong></span>
<a href="index.html" class="back-btn">&larr; Back</a>
</div>
</div>

<div class="main-layout">

<!-- LEFT: SLIDE IMAGE -->
<div class="slide-panel">
<div class="img-container">
<img id="slideImg" src="" alt="Slide">
</div>
<div class="nav-bar">
<button id="prevBtn" onclick="go(-1)">&larr;</button>
<div class="nav-dots" id="dots"></div>
<button id="nextBtn" onclick="go(1)">&rarr;</button>
</div>
<div class="kb-hint">Arrow keys to navigate</div>
</div>

<!-- RIGHT: SPEAKER NOTES -->
<div class="notes-panel">
<div class="notes-header">
<h3>Speaker Notes</h3>
<div class="slide-title" id="slideTitle">Slide 1 — Title</div>
</div>
<div class="tts-controls">
<button class="tts-btn" id="playBtn" onclick="toggleAutoPlay()">&#9654; Auto-Play</button>
<button class="tts-btn stop" id="stopBtn" onclick="stopAll()" style="display:none">&#9724; Stop</button>
<div class="sound-indicator" id="soundIndicator"><div class="sound-bar"></div><div class="sound-bar"></div><div class="sound-bar"></div><div class="sound-bar"></div><div class="sound-bar"></div></div>
<span class="tts-status-text" id="ttsStatus"></span>
<span class="tts-timer" id="ttsTimer"></span>
</div>
<div class="notes-body" id="notesBody">
<p>Loading...</p>
</div>
</div>

</div>

<!-- Slide images (base64 from PDF) -->
<script src="academic_slides.js"></script>

<script>
// Slide titles
var titles = [
"Title",
"Discover",
"Dream",
"Design",
"Destiny",
"Close"
];

// Speaker notes
var notes = [
// Slide 1 - Title
"Good afternoon. We are Group 3. Our challenge this week was simple to state and hard to answer: how can holistic leadership help organizations lead effectively in times of constant change?\n\nWe built our answer from real experience \u2014 not theory. Five people, five organizations, five countries. And one question: what actually works?",

// Slide 2 - Discover
"We started with the Appreciative Inquiry question: when was leadership at its best?\n\nAcross all five organizations, the answers converged around the same five truths.\n\nTrust came first \u2014 always. Not trust as a policy, but trust as a daily choice. The best leaders earned it by extending it first.\n\nFlexibility unlocked potential. When people had autonomy \u2014 especially during disruption \u2014 they found better solutions than any instruction manual could provide.\n\nOpen communication meant sharing optimism, acknowledging effort, and accepting imperfection. Not performing confidence \u2014 being transparent.\n\nProactive support structures were built in before crisis hit. The organizations that thrived were the ones where support already existed.\n\nAnd shared purpose reduced uncertainty. When people understood the why, they navigated the how themselves.\n\nThe key insight: every one of these truths is about focusing on people's strengths and creating conditions for them to succeed \u2014 not fixing what's broken.",

// Slide 3 - Dream
"A child of an employee said this during a company event. And it stopped the room.\n\nThis is the dream. Not metrics. Not awards. Not efficiency ratios.\n\nChildren who see their parents come home fulfilled, proud, and inspired. That is what a truly healthy organization looks like from the outside.\n\nThe dream is organizations where people thrive \u2014 not just survive. Where leaders focus on amplifying each person's strengths, creating the conditions for people to be at their best. Where change is met with resilience, not fear.\n\nAs leaders, we must shift from fixing weaknesses to amplifying strengths. When you focus on what people do best and build around that, performance becomes sustainable \u2014 and human.",

// Slide 4 - Design
"From five days of sessions, science, and group reflection, we distilled six leadership practices.\n\nSelf-awareness \u2014 know your strengths, your biases, your energy patterns. Leading from your best self makes others follow with theirs.\n\nTrust-building narrative \u2014 share the real story. Values, purpose, vulnerability. People follow leaders they believe, not leaders who perform.\n\nHealthy rhythms \u2014 protect energy through cadence. Respect biological clocks, not just business clocks.\n\nPsychological safety \u2014 create space for mistakes, for questions, for honest feedback. Belonging is not comfort \u2014 it is the safety to be real.\n\nGrowth through ownership \u2014 give people responsibility, not just tasks. Focus on each person\u2019s strengths and create conditions to amplify them.\n\nMindful resilience \u2014 build reflection into daily leadership. Pause before reacting. Seek the blind spots.\n\nOur Day 4 group work reinforced these with three principles: healthy organizational rules, genuine employee wellbeing, and creating great environments for human energy.",

// Slide 5 - Destiny
"None of this matters unless it becomes action.\n\nIn the first 30 days: listen and diagnose. Run a simple well-being pulse. Find where trust, energy, and safety are strong \u2014 and where they need attention. Start from strengths, not from gaps.\n\nIn the first 90 days: introduce practices. Start small \u2014 weekly reflection rituals, peer recognition, protected recovery time. Build habits before building systems.\n\nIn the first year: embed and evolve. Integrate practices into culture. Measure impact through engagement and energy \u2014 not just performance numbers. Adjust based on real feedback.\n\nThe commitment is not perfection. It is starting. And starting from what is already working \u2014 amplifying strengths rather than fixing problems.",

// Slide 6 - Close
"Leading through change is not about having all the answers.\n\nIt is about creating the conditions for people to find them together. About focusing on what makes each person strong, and building around that.\n\nThank you."
];

var total = 6;
var current = 1;

// Initialize dots
var dotsEl = document.getElementById('dots');
for(var i = 0; i < total; i++){
var d = document.createElement('span');
d.dataset.i = i + 1;
d.onclick = function(){ goTo(+this.dataset.i) };
dotsEl.appendChild(d);
}

function goTo(num){
if(num < 1 || num > total) return;
current = num;
document.getElementById('slideImg').src = slideImages[current - 1];
updateUI();
}

function go(dir){ goTo(current + dir); }

function updateUI(){
document.getElementById('currentNum').textContent = current;
document.getElementById('prevBtn').disabled = current === 1;
document.getElementById('nextBtn').disabled = current === total;
dotsEl.querySelectorAll('span').forEach(function(d,i){
d.className = (i + 1) === current ? 'active' : '';
});
document.getElementById('slideTitle').textContent = 'Slide ' + current + ' \u2014 ' + titles[current - 1];

var noteText = notes[current - 1];
var notesBody = document.getElementById('notesBody');
if(!noteText){
notesBody.innerHTML = '<p class="empty">No speaker notes for this slide.</p>';
} else {
var paragraphs = noteText.split('\n\n');
var html = '';
for(var i = 0; i < paragraphs.length; i++){
var p = paragraphs[i].trim();
if(!p) continue;
html += '<p>' + p.replace(/\n/g, '<br>') + '</p>';
}
notesBody.innerHTML = html;
}
notesBody.scrollTop = 0;
}

// Initial render
goTo(1);

document.addEventListener('keydown', function(e){
if(e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
if(e.key === 'Escape') stopAll();
});

// ===== TTS ENGINE v2 — Natural Voice =====
var ttsMode = null;
var ttsVoice = null;
var timerInterval = null;
var timerStart = 0;

function getAmericanVoice(){
if(ttsVoice) return ttsVoice;
var voices = speechSynthesis.getVoices();
if(!voices.length) return null;
var tier1 = ['Evan','Aaron','Nicky','Google US English','Microsoft Guy Online','Microsoft Aria Online','Microsoft Jenny','Samantha'];
for(var p=0;p<tier1.length;p++){
for(var v=0;v<voices.length;v++){
if(voices[v].name.indexOf(tier1[p])>=0 && voices[v].lang.indexOf('en')===0){ttsVoice=voices[v];console.log('TTS voice:',voices[v].name);return ttsVoice}
}}
var tier2 = ['Alex','Daniel','Fred','Tom'];
for(var p=0;p<tier2.length;p++){
for(var v=0;v<voices.length;v++){
if(voices[v].name.indexOf(tier2[p])>=0 && voices[v].lang.indexOf('en')===0){ttsVoice=voices[v];console.log('TTS voice:',voices[v].name);return ttsVoice}
}}
for(var v=0;v<voices.length;v++){if(voices[v].lang==='en-US'){ttsVoice=voices[v];return ttsVoice}}
for(var v=0;v<voices.length;v++){if(voices[v].lang.indexOf('en')===0){ttsVoice=voices[v];return ttsVoice}}
return null;
}
function initVoices(){getAmericanVoice();if(speechSynthesis.onvoiceschanged!==undefined){speechSynthesis.onvoiceschanged=function(){ttsVoice=null;getAmericanVoice()}}}
initVoices();

function startTimer(){timerStart=Date.now();updateTimerDisplay();timerInterval=setInterval(updateTimerDisplay,1000)}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}document.getElementById('ttsTimer').textContent=''}
function updateTimerDisplay(){var e=Math.floor((Date.now()-timerStart)/1000);var m=Math.floor(e/60);var s=e%60;document.getElementById('ttsTimer').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s}

function speakText(text, onEnd){
speechSynthesis.cancel();
var clean=text.replace(/\[Pause[^\]]*\]/g,'||PAUSE||').replace(/\[Point[^\]]*\]/g,'');
var segments=clean.split(/\n\n|(?:\|\|PAUSE\|\|)/);
var queue=[];
for(var s=0;s<segments.length;s++){
  var seg=segments[s].trim();if(!seg)continue;
  var sentences=seg.split(/(?<=[.!?])\s+/);var chunk='';
  for(var i=0;i<sentences.length;i++){
    if((chunk+' '+sentences[i]).length>150&&chunk.length>0){queue.push({text:chunk.trim(),pause:80});chunk=sentences[i]}
    else{chunk+=(chunk?' ':'')+sentences[i]}
  }
  if(chunk.trim())queue.push({text:chunk.trim(),pause:450});
}
var idx=0;
function speakNext(){
  if(idx>=queue.length||ttsMode===null){if(onEnd&&ttsMode!==null)onEnd();return}
  var utt=new SpeechSynthesisUtterance(queue[idx].text);
  var voice=getAmericanVoice();if(voice)utt.voice=voice;
  utt.lang='en-US';utt.rate=0.9;utt.pitch=1.0;utt.volume=1.0;
  utt.onend=function(){idx++;var p=(idx<queue.length)?queue[idx-1].pause:0;if(p>0&&ttsMode!==null){setTimeout(speakNext,p)}else{speakNext()}};
  utt.onerror=function(){idx++;speakNext()};
  speechSynthesis.speak(utt);
}
speakNext();
}

function updateTTSButtons(){
var playBtn=document.getElementById('playBtn');
var stopBtn=document.getElementById('stopBtn');
var indicator=document.getElementById('soundIndicator');
var status=document.getElementById('ttsStatus');
if(ttsMode==='autoplay'){
  playBtn.classList.add('active');stopBtn.style.display='';
  indicator.classList.add('active');status.textContent='Slide '+current+' / '+total;
} else {
  playBtn.classList.remove('active');stopBtn.style.display='none';
  indicator.classList.remove('active');status.textContent='';
}
}

function toggleAutoPlay(){
if(ttsMode==='autoplay'){stopAll();return}
stopAll();ttsMode='autoplay';updateTTSButtons();startTimer();autoPlaySlide();
}

function autoPlaySlide(){
if(ttsMode!=='autoplay')return;
document.getElementById('ttsStatus').textContent='Slide '+current+' / '+total;
var noteText=notes[current-1];
if(!noteText){
  setTimeout(function(){if(ttsMode!=='autoplay')return;if(current<total){go(1);setTimeout(autoPlaySlide,800)}else stopAll()},1500);return;
}
speakText(noteText,function(){
  if(ttsMode!=='autoplay')return;
  if(current<total){setTimeout(function(){go(1);setTimeout(autoPlaySlide,1200)},900)}else stopAll();
});
}

function stopAll(){speechSynthesis.cancel();ttsMode=null;stopTimer();updateTTSButtons()}
</script>
</body>
</html>
